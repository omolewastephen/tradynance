name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tradynance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tradynance?schema=public
      BETTER_AUTH_SECRET: ci-secret-not-used-in-production
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Monitoring stays off in CI (no DSN) — see Phase 11 / .env.example.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install (workspaces)
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate --schema web/prisma/schema.prisma

      - name: Apply migrations
        run: npx prisma migrate deploy --schema web/prisma/schema.prisma

      - name: Seed (assets + markets + static tickers; no market-maker)
        run: npm run db:seed:ci

      - name: Typecheck (web + core + services)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Core money tests (conservation-checked)
        run: npm run test:core

      - name: Build web
        run: npm run build --workspace web

  docker:
    name: docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build web image (standalone runner)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build services image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: services
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
